name: Uploader and Publisher

on:
  push:
    tags:
      - "*.*.*"

jobs:
  publish-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write
    env:
      MAVEN_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
      MAVEN_GPG_KEY: ${{ secrets.MAVEN_GPG_KEY }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: zulu
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
      - uses: jacobtomlinson/gha-find-replace@v3
        with:
          include: pom.xml
          find: <version>dev</version>
          replace: <version>${{ github.ref_name }}</version>
      - run: mvn --batch-mode --update-snapshots verify deploy
      - uses: softprops/action-gh-release@v3
        with:
          files: target/*.jar
          generate_release_notes: true
      - uses: jacobtomlinson/gha-find-replace@v3
        with:
          include: README.md
          find: <version>.+</version>
          replace: <version>${{ github.ref_name }}</version>
      - uses: jacobtomlinson/gha-find-replace@v3
        with:
          include: README.md
          find: "implementation 'com\\.conaxgames:clibraries:.+'"
          replace: "implementation 'com.conaxgames:clibraries:${{ github.ref_name }}'"
      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: main
          commit_message: "docs: updated to version `${{ github.ref_name }}`."
          file_pattern: README.md
